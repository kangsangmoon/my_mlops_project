name: Iris Training Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # dvc[gdrive]가 있어야 구글 드라이브와 통신이 가능합니다.
          pip install pandas scikit-learn mlflow dagshub dvc[gdrive]

      - name: Pull data from DVC
        env:
          # GitHub Secrets에 등록한 JSON 키를 환경 변수로 연결합니다.
          GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
        run: |
          # 1. 상문님의 리모트 이름(mlops_dvc_storage)에 서비스 계정 사용 설정 적용
          dvc remote modify mlops_dvc_storage gdrive_use_service_account true
          
          # 2. 구글 드라이브(mlops_dvc_storage 폴더)에서 실제 데이터셋 다운로드
          dvc pull

      - name: Run Training Script
        env:
          # MLflow(DagsHub) 인증 정보
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          # 데이터를 성공적으로 가져온 후 학습 스크립트 실행
          python train_with_mlflow.py